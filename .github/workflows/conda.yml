name: conda

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload to anaconda.org/isaaccorley (otherwise build-only)'
        type: boolean
        default: false

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: linux-64,      runner: ubuntu-latest    }
          - { target: linux-aarch64, runner: ubuntu-24.04-arm }
          - { target: osx-arm64,     runner: macos-14         }

    steps:
      - uses: actions/checkout@v4

      - name: Build with rattler-build
        uses: prefix-dev/rattler-build-action@v0.2.34
        with:
          recipe-path: conda-recipe/recipe.yaml
          build-args: --channel conda-forge
          # Disable the action's auto-upload: it uses a shared artifact name
          # across the matrix and 409s on parallel runs. We don't need
          # workflow-artifact uploads anyway — the real publish is to
          # anaconda.org, and built .conda files stay in output/ for the
          # subsequent step in this same job.
          upload-artifact: false

      - name: Upload to anaconda.org/isaaccorley
        if: startsWith(github.ref, 'refs/tags/v') || inputs.upload
        env:
          ANACONDA_API_KEY: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          if [ -z "${ANACONDA_API_KEY:-}" ]; then
            echo "::error::ANACONDA_TOKEN secret is not set. See conda-recipe/README.md."
            exit 1
          fi
          # macOS runners ship bash 3.2 (no globstar, no mapfile), so use find
          # with a null-delimited while-read loop that works on every runner.
          count=0
          while IFS= read -r -d '' f; do
            echo ">> uploading $f"
            rattler-build upload anaconda --owner isaaccorley --force "$f"
            count=$((count + 1))
          done < <(find output -type f \( -name '*.conda' -o -name '*.tar.bz2' \) -print0)
          if [ "$count" -eq 0 ]; then
            echo "::error::no built artifacts found under output/"
            exit 1
          fi
