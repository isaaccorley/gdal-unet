name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # release job uploads artifacts

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux, arch: x86_64, runner: ubuntu-latest      }
          - { os: linux, arch: arm64,  runner: ubuntu-24.04-arm   }
          - { os: macos, arch: arm64,  runner: macos-14           }
          - { os: macos, arch: x86_64, runner: macos-13           }

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          channels: conda-forge
          channel-priority: strict
          activate-environment: gdal-conv2d-build

      - name: Install build + test deps via conda-forge
        run: |
          conda install -y -c conda-forge \
              cmake ninja \
              'libgdal>=3.11' \
              llvm-openmp \
              numpy rasterio scipy pytorch

      - name: Configure
        # Install into $CONDA_PREFIX so @loader_path/../lib (macOS) /
        # $ORIGIN/../lib (Linux) resolves to conda's libgdal at runtime --
        # matches how conda-forge will install the package on the end user's
        # machine.  We copy the binary out of $CONDA_PREFIX/bin into the
        # release tarball at the Stage step below.
        run: |
          cmake -S cpp -B cpp/build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="$CONDA_PREFIX" \
              -DCMAKE_PREFIX_PATH="$CONDA_PREFIX"

      - name: Build
        run: cmake --build cpp/build -j

      - name: Install
        run: cmake --install cpp/build

      - name: Sanity check
        run: |
          file "$CONDA_PREFIX/bin/gdal-conv2d"
          "$CONDA_PREFIX/bin/gdal-conv2d" --help

      - name: Per-mode parity tests
        run: |
          export GDAL_CONV2D="$CONDA_PREFIX/bin/gdal-conv2d"
          export PYTHON="$CONDA_PREFIX/bin/python"
          bash cpp/tests/test_modes.sh

      - name: Stage release bundle
        run: |
          STAGE="gdal-conv2d-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "$STAGE"
          cp "$CONDA_PREFIX/bin/gdal-conv2d" "$STAGE/"
          cp README.md LICENSE               "$STAGE/" 2>/dev/null || true
          tar -czf "$STAGE.tar.gz" "$STAGE"
          ls -lh "$STAGE.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: gdal-conv2d-${{ matrix.os }}-${{ matrix.arch }}
          path: gdal-conv2d-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - run: ls -lh dist/

      - name: Compute sha256 of the source tarball (for conda-forge bump)
        id: srctar
        run: |
          curl -sL -o /tmp/source.tar.gz \
              "https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          sha=$(sha256sum /tmp/source.tar.gz | cut -d' ' -f1)
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "Source tarball sha256: $sha"

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/gdal-conv2d-*.tar.gz
          generate_release_notes: true
          body: |
            ## Binary downloads

            One tarball per platform.  Each contains the `gdal-conv2d` binary
            plus README and LICENSE.

            ## conda-forge

            Source tarball sha256 (paste into `conda-recipe/meta.yaml`
            on the next conda-forge feedstock PR):

            ```
            sha256: ${{ steps.srctar.outputs.sha256 }}
            ```
