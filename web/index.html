<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gdal-unet · road inference</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="viewport">
    <div id="map"></div>

    <header id="brand" class="glass-panel">
      <div class="brand-mark">
        <svg viewBox="0 0 32 32" width="28" height="28" aria-hidden="true">
          <circle class="brand-ring"   cx="16" cy="16" r="12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3 4" opacity="0.55"/>
          <circle class="brand-ring-2" cx="16" cy="16" r="7"  fill="none" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 3" opacity="0.85"/>
          <circle cx="16" cy="16" r="2.2" fill="currentColor"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>gdal-unet</h1>
        <div class="brand-sub mono">resnet18 · chesapeakersc</div>
      </div>
    </header>

    <aside id="sidebar" class="glass-panel">
      <div class="sidebar-head">
        <div class="search-wrap">
          <svg viewBox="0 0 16 16" width="13" height="13" class="search-icon" aria-hidden="true">
            <circle cx="7" cy="7" r="5" fill="none" stroke="currentColor" stroke-width="1.4"/>
            <path d="M11 11 L14 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input id="search" type="text" placeholder="Filter layers…  ( / )" autocomplete="off" spellcheck="false" />
          <kbd class="kbd">/</kbd>
        </div>
        <button id="toggle-groups" class="icon-btn" data-state="open" title="Collapse all groups" aria-label="Collapse all groups">
          <svg class="icon-collapse" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
            <path d="M3 5 L8 10 L13 5 M3 11 L8 6 L13 11" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg class="icon-expand" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
            <path d="M3 7 L8 2 L13 7 M3 9 L8 14 L13 9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div id="sidebar-body" class="scrollable-list">
        <div id="loading" class="loading-row">
          <span class="spinner"></span>
          <span>Loading layers…</span>
        </div>
      </div>
      <div class="sidebar-foot mono">
        <span><kbd class="kbd">←</kbd><kbd class="kbd">→</kbd> layer</span>
        <span><kbd class="kbd">J</kbd><kbd class="kbd">K</kbd> channel</span>
      </div>
    </aside>

    <section id="legend" class="glass-panel hidden">
      <div class="legend-head">
        <div class="legend-title">
          <span class="legend-name">—</span>
          <span class="legend-chip mono">—</span>
        </div>
        <div class="legend-view mono">—</div>
      </div>
      <div class="legend-body">—</div>
      <div class="legend-controls">
        <label class="control-row">
          <span class="control-label mono">OPACITY</span>
          <input id="opacity" type="range" min="0" max="100" value="92" step="1" />
          <span id="opacity-val" class="control-val mono">92</span>
        </label>
      </div>
    </section>

    <aside id="minimap" class="glass-panel" aria-label="U-Net topology">
      <div class="minimap-head mono">U-NET TOPOLOGY</div>
      <div id="minimap-svg"></div>
    </aside>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
