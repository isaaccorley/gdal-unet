schema_version: 1

context:
  name: gdal-conv2d
  version: "0.2.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

# Source from the git tag — no sha256 needed. The tag must exist before the
# rattler-build job runs (it always does: this workflow only fires on tag push).
source:
  git: https://github.com/isaaccorley/gdal-unet.git
  tag: v${{ version }}

build:
  number: 0
  skip: win

requirements:
  build:
    - ${{ compiler('cxx') }}
    # Pin against an old sysroot so the resulting binary runs on
    # essentially any modern Linux. Without this, builds on
    # ubuntu-latest GHA runners link against glibc 2.39 and fail with
    # `GLIBC_2.34 not found` on older hosts.
    - if: linux and x86_64
      then: sysroot_linux-64 ==2.17
    - if: linux and aarch64
      then: sysroot_linux-aarch64 ==2.17
    - cmake >=3.15
    - ninja
    - if: unix
      then: make
  host:
    - libgdal >=3.11
    - onednn >=3.4
    - if: osx
      then: llvm-openmp
    - if: linux
      then: libgomp
  run:
    - libgdal >=3.11
    - onednn >=3.4
    - if: osx
      then: llvm-openmp
    - if: linux
      then: libgomp

tests:
  - script:
      - gdal-conv2d --help

about:
  homepage: https://github.com/isaaccorley/gdal-unet
  license: MIT
  license_file: LICENSE
  summary: A fused Conv2d + BN + activation primitive built on GDAL CLI
  description: |
    gdal-conv2d is a single C++17 binary that performs one fused
    Conv2d + (bias|BN) + activation + (stride|padding|depthwise) layer
    using GDAL for I/O.  Also exposes maxpool, nearest-upsample, add,
    concat, scale, and stable softmax as additional --mode flags.

    Designed to be chained ~30-150 times via a shell script to run a
    full conv-based U-Net forward pass.  See the parent project at
    https://github.com/isaaccorley/gdal-unet for the gdal-unet
    Python tool that generates such scripts from PyTorch checkpoints.

    Outputs Float16 GeoTIFFs preserving CRS + geotransform.  Inner conv
    loops parallelize over output channels via OpenMP.
  repository: https://github.com/isaaccorley/gdal-unet
  documentation: https://github.com/isaaccorley/gdal-unet

extra:
  recipe-maintainers:
    - isaaccorley
